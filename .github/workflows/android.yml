name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'screenshots/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ "main", "master", "dev" ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'screenshots/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract Version Name
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION_NAME=v$VERSION_NAME" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          fi
          if [ ! -f debug.keystore ]; then
            echo "No debug keystore found. Generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore restored successfully."
          fi

      - name: Setup Release Keystore
        if: github.ref != 'refs/heads/dev' && github.base_ref != 'dev'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASS" ]; then
            echo "Release signing secrets are missing. Set RELEASE_KEYSTORE_BASE64 and RELEASE_KEYSTORE_PASSWORD."
            exit 1
          fi
          echo "Decoding production/release keystore from secrets..."
          echo "$KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > tsuzuku.jks
          echo "STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV

          FINAL_KEY_PASS="${KEY_PASS:-$STORE_PASS}"
          echo "KEY_PASSWORD=$FINAL_KEY_PASS" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/tsuzuku.jks" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: false

      - name: Build Debug APK
        if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
        run: |
          ./gradlew assembleDebug

      - name: Build Release APK
        if: github.ref != 'refs/heads/dev' && github.base_ref != 'dev'
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_KEYSTORE_PATH="$KEYSTORE_PATH" \
            -PRELEASE_STORE_PASSWORD="$STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="upload" \
            -PRELEASE_KEY_PASSWORD="$KEY_PASSWORD"

      - name: Rename Debug APK
        if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/tsuzuku-debug.apk

      - name: Rename Release APK
        if: github.ref != 'refs/heads/dev' && github.base_ref != 'dev'
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tsuzuku-release.apk

      - name: Verify Release APK Signature
        if: github.ref != 'refs/heads/dev' && github.base_ref != 'dev'
        run: |
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/tsuzuku-release.apk

      - name: Upload Debug APK Artifact
        if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-debug
          path: app/build/outputs/apk/debug/tsuzuku-debug.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact
        if: github.ref != 'refs/heads/dev' && github.base_ref != 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-release-apk
          path: app/build/outputs/apk/release/tsuzuku-release.apk
          if-no-files-found: error

      - name: Delete Existing Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.VERSION_NAME }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.VERSION_NAME }}
          make_latest: true
          files: |
            app/build/outputs/apk/release/tsuzuku-release.apk
          draft: false
          prerelease: false
          body: |
            ## Tsuzuku Open-Source Release

            This release includes the latest Tsuzuku habit tracking, focus mode, launcher, insights, reminder, and backup improvements.

            ### Download Assets
            - **Production Release APK (signed)**: tsuzuku-release.apk

            _Built and packaged automatically by GitHub Actions._
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
