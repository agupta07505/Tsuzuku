name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'screenshots/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'screenshots/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create fallback .env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env || echo "GEMINI_API_KEY=dummy" > .env
          fi

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          fi
          if [ ! -f debug.keystore ]; then
            echo "No debug keystore found! Generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore restored successfully."
          fi

      - name: Setup Release Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding production/release keystore from secrets..."
            # Decode base64 release keystore cleanly, removing blank spaces/newlines
            echo "$KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > tsuzuku.jks
            echo "STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
            
            # Use KEY_PASS if provided, otherwise default to STORE_PASS
            FINAL_KEY_PASS="${KEY_PASS:-$STORE_PASS}"
            echo "KEY_PASSWORD=$FINAL_KEY_PASS" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/tsuzuku.jks" >> $GITHUB_ENV
          else
            echo "Using fallback production/release signing credentials..."
            keytool -genkey -v -keystore tsuzuku.jks -storepass fallbackpassword -alias upload -keypass fallbackpassword -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Tsuzuku Production Fallback,O=Tsuzuku,C=US"
            echo "STORE_PASSWORD=fallbackpassword" >> $GITHUB_ENV
            echo "KEY_PASSWORD=fallbackpassword" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/tsuzuku.jks" >> $GITHUB_ENV
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Build Debug & Release APKs
        run: |
          ./gradlew assembleDebug assembleRelease \
            -PRELEASE_KEYSTORE_PATH="$KEYSTORE_PATH" \
            -PRELEASE_STORE_PASSWORD="$STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="upload" \
            -PRELEASE_KEY_PASSWORD="$KEY_PASSWORD"

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tsuzuku-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/tsuzuku-debug.apk

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-debug
          path: app/build/outputs/apk/debug/tsuzuku-debug.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-release-apk
          path: app/build/outputs/apk/release/tsuzuku-release.apk
          if-no-files-found: error

      - name: Delete existing release (clean slate)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          make_latest: true
          files: |
            app/build/outputs/apk/release/tsuzuku-release.apk
            app/build/outputs/apk/debug/tsuzuku-debug.apk
          draft: false
          prerelease: false
          body: |
            ## Tsuzuku Open-Source Release 🌿

            Welcome to the new release of Tsuzuku habit tracker!

            ### 📦 Download Assets
            - **Production Release APK (signed)**: tsuzuku-release.apk
            - **Developer Debug APK**: tsuzuku-debug.apk

            _Built and packaged automatically by GitHub Actions._
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
