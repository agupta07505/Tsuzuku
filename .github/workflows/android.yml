name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create fallback .env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env || echo "GEMINI_API_KEY=dummy" > .env
          fi

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          fi
          if [ ! -f debug.keystore ]; then
            echo "No debug keystore found! Generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore restored successfully."
          fi

      - name: Setup Release Keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Decoding production/release keystore from secrets..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > tsuzuku.jks
            echo "STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/tsuzuku.jks" >> $GITHUB_ENV
          else
            echo "Using fallback production/release signing credentials..."
            keytool -genkey -v -keystore tsuzuku.jks -storepass fallbackpassword -alias upload -keypass fallbackpassword -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Tsuzuku Production Fallback,O=Tsuzuku,C=US"
            echo "STORE_PASSWORD=fallbackpassword" >> $GITHUB_ENV
            echo "KEY_PASSWORD=fallbackpassword" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/tsuzuku.jks" >> $GITHUB_ENV
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Build Debug & Release APKs
        run: |
          gradle assembleDebug assembleRelease \
            -PRELEASE_KEYSTORE_PATH="${{ env.KEYSTORE_PATH }}" \
            -PRELEASE_STORE_PASSWORD="${{ env.STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="upload" \
            -PRELEASE_KEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Rename Release APK with Version
        run: |
          VERSION_NAME=$(git describe --tags --always || echo "1.0")
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tsuzuku-release-$VERSION_NAME.apk
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/tsuzuku-debug-$VERSION_NAME.apk
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-debug-apk-${{ env.VERSION_NAME }}
          path: app/build/outputs/apk/debug/tsuzuku-debug-${{ env.VERSION_NAME }}.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsuzuku-release-apk-${{ env.VERSION_NAME }}
          path: app/build/outputs/apk/release/tsuzuku-release-${{ env.VERSION_NAME }}.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/tsuzuku-release-${{ env.VERSION_NAME }}.apk
            app/build/outputs/apk/debug/tsuzuku-debug-${{ env.VERSION_NAME }}.apk
          draft: false
          prerelease: false
          body: |
            ## Tsuzuku Open-Source Release 🌿
            
            Welcome to the new release of Tsuzuku habit tracker!
            
            ### 📦 Download Assets
            - **Production Release APK (signed)**: [tsuzuku-release-${{ env.VERSION_NAME }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION_NAME }}/tsuzuku-release-${{ env.VERSION_NAME }}.apk)
            - **Developer Debug APK**: [tsuzuku-debug-${{ env.VERSION_NAME }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION_NAME }}/tsuzuku-debug-${{ env.VERSION_NAME }}.apk)
            
            _Built and packaged automatically by GitHub Actions._
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
